# =============================================================================
# 3D Ninjaz — CI + Deploy workflow
# =============================================================================
#
# Trigger matrix:
#   - push to `dev`     -> build + deploy to the `dev`  environment
#   - push to `master`  -> build + deploy to the `prod` environment
#
# The deploy step is a SKELETON: it installs, typechecks, and builds, then
# uploads the artifact over SSH to the cPanel server and restarts the Node
# process. Server-side placeholders (PM2 unit name, deploy root) must be set
# via environment-scoped GitHub Secrets before the workflow can run green.
#
# Secrets (per-environment, set via `gh secret set --env <env>`):
#   SSH_HOST             e.g. 152.53.86.223
#   SSH_USER             e.g. ninjaz        (NOT root — deploy runs as app user)
#   SSH_PORT             e.g. 22
#   SSH_PRIVATE_KEY      PEM contents of a dedicated CI key
#   DEPLOY_PATH          e.g. /home/ninjaz/apps/3dninjaz_v1
#   APP_RESTART_CMD      e.g. "systemctl --user restart 3dninjaz" OR
#                             "pkill -f 'node server.js' || true; nohup node server.js > app.log 2>&1 &"
#   DATABASE_URL         mysql://user:pass@host:3306/dbname
#   BETTER_AUTH_SECRET   64-hex production secret
#   BETTER_AUTH_URL      https://app.3dninjaz.com  (prod)  /  https://dev.3dninjaz.com (dev)
#   PAYPAL_CLIENT_ID
#   PAYPAL_CLIENT_SECRET
#   PAYPAL_CURRENCY
#   NEXT_PUBLIC_PAYPAL_CLIENT_ID
#   NEXT_PUBLIC_PAYPAL_CURRENCY
#   NEXT_PUBLIC_SITE_URL
#   NEXT_PUBLIC_BASE_URL
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASSWORD / SMTP_FROM
#
# Do NOT hardcode any of the above in this file.
# =============================================================================

name: Deploy

on:
  # Auto-deploy on push to dev (testing → app.3dninjaz.com). Master/prod
  # added once prod env secrets (SSH_HOST/USER/KEY/DEPLOY_PATH/APP_RESTART_CMD
  # + NEXT_PUBLIC_*) are populated via `gh secret set --env prod`.
  push:
    branches:
      - dev
      - master
  # On PRs targeting dev/master, run `verify` only (typecheck + lint). build +
  # deploy jobs skip on PRs (gated by `if: github.event_name == 'push'`).
  # Branch protection requires the verify check to pass before merge.
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

concurrency:
  # One in-flight deploy per environment. Later pushes queue instead of racing.
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1) Install + typecheck — runs on every push, regardless of target branch.
  # ---------------------------------------------------------------------------
  verify:
    name: Install + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  # ---------------------------------------------------------------------------
  # 2) Build — produces a Next.js production artifact that the deploy step
  #    uploads. Runs under the environment matching the branch so that
  #    NEXT_PUBLIC_* vars are baked in with the right origin for that env.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ github.ref_name == 'master' && 'prod' || 'dev' }})
    needs: verify
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'master' && 'prod' || 'dev' }}
    env:
      # Client-bundle vars (baked into JS at build time)
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
      NEXT_PUBLIC_PAYPAL_CURRENCY: ${{ secrets.NEXT_PUBLIC_PAYPAL_CURRENCY }}
      # Server-only vars needed at build time for static prerender
      # (Better Auth + Drizzle queries on /shop /about /sitemap.xml etc.)
      DATABASE_URL: ${{ secrets.DATABASE_URL_BUILD }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      PAYPAL_ENV: ${{ secrets.PAYPAL_ENV }}
      PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
      PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
      PAYPAL_CURRENCY: ${{ secrets.PAYPAL_CURRENCY }}
      PAYPAL_RETURN_URL: ${{ secrets.PAYPAL_RETURN_URL }}
      PAYPAL_CANCEL_URL: ${{ secrets.PAYPAL_CANCEL_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      DELYVA_BASE_URL: ${{ secrets.DELYVA_BASE_URL }}
      DELYVA_API_KEY: ${{ secrets.DELYVA_API_KEY }}
      DELYVA_COMPANY_CODE: ${{ secrets.DELYVA_COMPANY_CODE }}
      DELYVA_COMPANY_ID: ${{ secrets.DELYVA_COMPANY_ID }}
      DELYVA_USER_ID: ${{ secrets.DELYVA_USER_ID }}
      DELYVA_CUSTOMER_ID: ${{ secrets.DELYVA_CUSTOMER_ID }}
      DELYVA_API_SECRET: ${{ secrets.DELYVA_API_SECRET }}
      DELYVA_WEBHOOK_SHARED_SECRET: ${{ secrets.DELYVA_WEBHOOK_SHARED_SECRET }}
      # Stable Server Action IDs across builds — without this, every deploy
      # rotates the action hash salt and any open browser tab loses its
      # `updateProduct`/etc. references ("Failed to find Server Action").
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
      # Note: do NOT set NODE_ENV=production at job scope — it makes
      # `npm ci` skip devDependencies (including typescript), which
      # next.config.ts loading requires. Next.js sets NODE_ENV=production
      # internally during `next build` regardless. Runtime env on cPanel
      # already has NODE_ENV=production via .env.local.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure SSH (for DB tunnel)
        # Same key used by deploy job. We need DB access from the runner during
        # `next build` because static prerender executes server queries (sitemap
        # crawls products, layout reads store_settings, /about renders settings).
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Open SSH tunnel for MariaDB (3306 → cPanel)
        # Forwards runner's localhost:3306 → cPanel host's 127.0.0.1:3306 over
        # the deploy SSH key. DATABASE_URL_BUILD secret uses 127.0.0.1:3306 as
        # its host so build-time queries land on the production DB without
        # opening MariaDB to the public internet or whitelisting volatile
        # GitHub Actions runner IPs.
        # ServerAliveInterval keeps the tunnel from idle-killing during build.
        run: |
          ssh -fN -p "${{ secrets.SSH_PORT }}" \
            -L 3306:127.0.0.1:3306 \
            -o ServerAliveInterval=30 \
            -o ExitOnForwardFailure=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          echo "tunnel-pid=$(pgrep -f 'ssh -fN -p .* -L 3306:' | head -1)" >> "$GITHUB_ENV"
          # Probe to confirm tunnel works before build wastes 3+ min.
          for i in 1 2 3 4 5; do
            if (echo > /dev/tcp/127.0.0.1/3306) 2>/dev/null; then echo "tunnel up"; exit 0; fi
            sleep 1
          done
          echo "tunnel did not come up" >&2
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Close SSH tunnel
        if: always()
        run: |
          if [ -n "${tunnel_pid:-}" ]; then kill "$tunnel_pid" 2>/dev/null || true; fi
          pkill -f 'ssh -fN -p .* -L 3306:' 2>/dev/null || true

      - name: Package artifact
        # server.js + .next/ + public/ + package.json + package-lock.json are
        # the minimum set the Node server needs at runtime. node_modules is
        # re-installed on the target with `npm ci --omit=dev`.
        run: |
          tar --exclude='.next/cache' \
              -czf deploy.tar.gz \
              .next public server.js package.json package-lock.json next.config.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: deploy.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3) Deploy — SKELETON. Uploads the artifact via SSH, extracts, re-installs
  #    production deps, and restarts the Node app. Customize APP_RESTART_CMD
  #    per environment (systemd user unit preferred over nohup).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ github.ref_name == 'master' && 'prod' || 'dev' }})
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'master' && 'prod' || 'dev' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle

      - name: Configure SSH
        # Writes the private key and a locked-down ssh config so scp/ssh can
        # reach the target without interactive prompts.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload + extract bundle
        run: |
          # -O forces the legacy SCP protocol. Modern OpenSSH 9+ scp defaults
          # to SFTP, but the cPanel host (OpenSSH 8.7) does not enable the
          # SFTP subsystem for cPanel users — failing with "No such file or
          # directory" on the destination. Legacy SCP works fine.
          scp -O -P "${{ secrets.SSH_PORT }}" deploy.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/deploy.tar.gz"
          # CloudLinux nodevenv activate puts npm/node on PATH for the
          # cPanel user. Without it, npm is not in the default ninjaz $PATH.
          #
          # CloudLinux NodeJS Selector contract: node_modules MUST be a symlink
          # to the nodevenv virtual-environment lib folder. If tar extraction or
          # a previous failed deploy left a real directory there, CloudLinux
          # blocks further npm operations. We restore the symlink before running
          # npm ci so the install always lands in the virtualenv, not app root.
          #
          # Full `npm ci` (no --omit=dev) is required because next.config.ts is
          # loaded at server runtime (server.js → next() → loads config), which
          # means the `typescript` package must be present at runtime. Dropping
          # devDependencies would cause "Cannot find module 'typescript'" on boot.
          ssh -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e && \
             source /home/ninjaz/nodevenv/apps/3dninjaz_v1/20/bin/activate && \
             unset NODE_ENV && \
             cd '${{ secrets.DEPLOY_PATH }}' && \
             rm -rf .next && \
             tar -xzf deploy.tar.gz && \
             rm deploy.tar.gz && \
             if [ ! -L node_modules ]; then \
               rm -rf node_modules; \
               ln -s /home/ninjaz/nodevenv/apps/3dninjaz_v1/20/lib/node_modules node_modules; \
             fi && \
             npm ci --include=dev"

      - name: Restart app
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "${{ secrets.APP_RESTART_CMD }}"

      - name: Smoke test
        # Non-fatal HEAD check. Fails the job if the public origin does not
        # return 2xx / 3xx. Do NOT curl `lswsctrl restart` — graceful reload
        # only from the server side (see CLAUDE.md LiteSpeed notes).
        run: |
          URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          echo "Smoke-testing $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL/")
          echo "Got HTTP $code"
          case "$code" in
            2*|3*) exit 0 ;;
            *) exit 1 ;;
          esac
