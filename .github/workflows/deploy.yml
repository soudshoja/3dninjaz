# =============================================================================
# 3D Ninjaz — CI + Deploy workflow
# =============================================================================
#
# Architecture: source archive deploy.
# - GitHub runner: typecheck + git archive only (no DB / no env secrets)
# - cPanel host: extract + npm ci + npm run build + restart (has DB + .env.local)
#
# Trigger:
#   push to `dev`     -> deploy to dev    (https://app.3dninjaz.com)
#   push to `master`  -> deploy to prod   (https://3dninjaz.com)        (gated by prod env secrets)
#
# Per-environment GitHub secrets required (set via `gh secret set --env <env>`):
#   SSH_HOST              152.53.86.223
#   SSH_USER              ninjaz
#   SSH_PORT              22
#   SSH_PRIVATE_KEY       PEM contents of CI deploy key (public half on cPanel
#                         ~/.ssh/authorized_keys for the ninjaz user)
#   DEPLOY_PATH           /home/ninjaz/apps/3dninjaz_v1
#   NEXT_PUBLIC_SITE_URL  https://app.3dninjaz.com   (dev) or https://3dninjaz.com (prod)
#
# Server-only env vars (DATABASE_URL, BETTER_AUTH_SECRET, PAYPAL_*, SMTP_*,
# DELYVA_*, etc.) live in `/home/ninjaz/apps/3dninjaz_v1/.env.local` on the
# cPanel host. `next build` and runtime read them from there. They are NOT
# stored in GitHub secrets — keeping the secret surface small.
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1) Verify — typecheck on the runner. Fast feedback on broken commits before
  #    we hit the slower cPanel build path. No DB / no env secrets needed.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify (typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # 2) Deploy — package source via `git archive`, scp to cPanel, build + restart
  #    on the cPanel host. cPanel has DB + .env.local so static prerender works.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ github.ref_name == 'master' && 'prod' || 'dev' }})
    needs: verify
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'master' && 'prod' || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build source archive
        # `git archive` produces a deterministic snapshot of tracked files at
        # HEAD. Excludes .git, node_modules, .next, .planning automatically
        # (only tracked files). Output ~5-10 MB compressed.
        run: |
          git archive --format=tar.gz --output=source.tar.gz HEAD
          ls -lh source.tar.gz

      - name: Upload archive to cPanel
        run: |
          scp -P "${{ secrets.SSH_PORT }}" source.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/source.tar.gz"

      - name: Build + restart on cPanel
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s <<EOF
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # Activate CloudLinux Node 20 venv so npm/node are on PATH
            set +u
            source /home/ninjaz/nodevenv/apps/3dninjaz_v1/20/bin/activate
            set -u

            # Extract source over existing tree. .env.local, app.log,
            # node_modules, .next stay (not in archive).
            tar -xzf source.tar.gz
            rm source.tar.gz

            # Reset deps to lockfile-exact, build, slim down.
            npm ci
            npm run build
            npm prune --omit=dev

            # Restart node — start.sh kills the old process and respawns
            # in a new session via setsid + nohup.
            bash start.sh
          EOF

      - name: Smoke test
        run: |
          URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          echo "Smoke-testing $URL"
          # Give the new node process a few seconds to bind the port.
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL/" || echo "000")
            echo "attempt $i: HTTP $code"
            case "$code" in 2*|3*) exit 0 ;; esac
            sleep 5
          done
          exit 1
