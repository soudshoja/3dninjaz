<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bambu Lab — PLA & PETG Color Reference</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f10; color: #e8e8e8; line-height: 1.45; padding: 16px; padding-bottom: 48px; }
header { max-width: 1100px; margin: 0 auto 18px; padding: 14px 4px; border-bottom: 1px solid #2a2a2d; }
h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
header p { font-size: 0.82rem; color: #9a9a9f; }
main { max-width: 1100px; margin: 0 auto; }
.tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; position: sticky; top: 0; background: #0f0f10; padding: 8px 0; z-index: 10; border-bottom: 1px solid #1f1f22; }
.tab { padding: 6px 12px; border-radius: 999px; background: #1c1c20; color: #c8c8cc; border: 1px solid #2a2a2e; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: all 0.15s; }
.tab:hover { background: #25252a; }
.tab.active { background: #f0f0f3; color: #0f0f10; border-color: #f0f0f3; }
.section { display: none; margin-bottom: 24px; }
.section.active { display: block; }
.section-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; padding: 11px 14px; background: linear-gradient(180deg, #18181c, #131316); border-radius: 10px; border: 1px solid #25252a; }
.section-header h2 { font-size: 1rem; font-weight: 600; }
.section-header .count { font-size: 0.76rem; color: #8a8a90; }
.section-note { font-size: 0.78rem; color: #a0a0a6; margin-top: 5px; width: 100%; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 9px; }
.swatch { background: #16161a; border: 1px solid #25252a; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.12s, border-color 0.12s; }
.swatch:hover { transform: translateY(-2px); border-color: #404048; }
.color-block { height: 68px; width: 100%; border-bottom: 1px solid #25252a; position: relative; }
.translucent .color-block { background-image: linear-gradient(45deg, #2a2a2e 25%, transparent 25%), linear-gradient(-45deg, #2a2a2e 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #2a2a2e 75%), linear-gradient(-45deg, transparent 75%, #2a2a2e 75%); background-size: 12px 12px; background-position: 0 0, 0 6px, 6px -6px, -6px 0; }
.translucent .color-overlay { position: absolute; inset: 0; opacity: 0.7; }
.info { padding: 8px 10px; }
.name { font-size: 0.83rem; font-weight: 500; color: #f0f0f3; margin-bottom: 3px; line-height: 1.25; }
.code-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; flex-wrap: wrap; }
.code { font-size: 0.7rem; font-weight: 600; font-family: "SF Mono", Menlo, Consolas, monospace; padding: 1px 6px; border-radius: 4px; color: #6db3e8; background: rgba(109, 179, 232, 0.12); }
.hex { font-size: 0.7rem; color: #8a8a90; font-family: "SF Mono", Menlo, Consolas, monospace; }
.banner { border-radius: 10px; padding: 11px 14px; margin-bottom: 12px; font-size: 0.83rem; }
.banner.focus { background: linear-gradient(135deg, rgba(80,120,200,0.18), rgba(80,120,200,0.05)); border: 1px solid rgba(120,160,220,0.3); color: #c8d6f0; }
.banner.focus strong { color: #e8eef8; }
.banner.alert { background: linear-gradient(135deg, rgba(220,160,80,0.2), rgba(220,160,80,0.05)); border: 1px solid rgba(240,180,100,0.4); color: #f0d8b8; }
.banner.alert strong { color: #fff0d8; }
footer { margin-top: 28px; padding-top: 14px; border-top: 1px solid #25252a; font-size: 0.73rem; color: #6a6a70; max-width: 1100px; margin-left: auto; margin-right: auto; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1f3a26; color: #5dd55d; padding: 9px 17px; border-radius: 999px; border: 1px solid #2f5a36; font-size: 0.83rem; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; }
@media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 7px; } .color-block { height: 58px; } .name { font-size: 0.77rem; } .hex, .code { font-size: 0.66rem; } }
</style>
</head>
<body>

</header>
<main>
  <div class="tabs" id="tabs"></div>
  <div id="sections"></div>
  <footer>Source: Bambu Lab official Hex Code PDFs and product pages (us.store.bambulab.com, shop3duniverse.com, caz3d.com). 5-digit codes are Bambu's official RFID/SKU identifiers.</footer>

const order = ["petg-translucent", "pla-translucent", "pla-basic", "pla-matte", "petg-hf", "petg-basic", "petg-cf"];
const tabs = document.getElementById("tabs");
const sections = document.getElementById("sections");
const toast = document.getElementById("toast");
function showToast(m) { toast.textContent = m; toast.classList.add("show"); clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove("show"), 1400); }
order.forEach((key, i) => {
  const d = data[key];
  const tab = document.createElement("button");
  tab.className = "tab" + (i === 0 ? " active" : "");
  tab.textContent = d.label;
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("s-" + key).classList.add("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  tabs.appendChild(tab);
  const s = document.createElement("section");
  s.className = "section" + (i === 0 ? " active" : "");
  s.id = "s-" + key;
  s.innerHTML = `<div class="section-header"><h2>${d.title}</h2><span class="count">${d.colors.length} colors</span><div class="section-note">${d.note}</div></div>`;
  if (d.banner) {
    const b = document.createElement("div");
    b.className = "banner " + (d.bannerType || "focus");
    b.innerHTML = d.banner;
    s.appendChild(b);
  }
  const grid = document.createElement("div");
  grid.className = "grid" + (d.translucent ? " translucent" : "");
  d.colors.forEach(c => {
    const sw = document.createElement("div");
    sw.className = "swatch";
    sw.onclick = () => { navigator.clipboard.writeText(`${c.name} (${c.code}) - ${c.hex}`).then(() => showToast(`${c.code} · ${c.hex}`)); };
    const block = d.translucent
      ? `<div class="color-block"><div class="color-overlay" style="background:${c.hex}"></div></div>`
      : `<div class="color-block" style="background:${c.hex}"></div>`;
    sw.innerHTML = `${block}<div class="info"><div class="name">${c.name}</div><div class="code-row"><span class="code">${c.code}</span><span class="hex">${c.hex}</span></div></div>`;
    grid.appendChild(sw);
  });
  s.appendChild(grid);
  sections.appendChild(s);
});
</script>

</html>
